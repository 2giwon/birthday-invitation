<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Gamja Flower', cursive;
      position: relative;
    }

    /* === KRAFT PAPER BACKGROUND === */
    .bg {
      position: absolute;
      inset: 0;
      background-color: #e0d4be;
      /* Layered grain texture */
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent, transparent 2px,
          rgba(0,0,0,0.015) 2px, rgba(0,0,0,0.015) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent, transparent 3px,
          rgba(0,0,0,0.01) 3px, rgba(0,0,0,0.01) 6px
        ),
        radial-gradient(ellipse at 30% 20%, rgba(210,195,165,0.8), transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(190,175,148,0.6), transparent 50%);
    }

    /* Vignette */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(61,46,30,0.15) 100%);
      z-index: 1;
    }

    /* === TAPE DECORATIONS === */
    .tape {
      position: absolute;
      height: 28px;
      border-radius: 1px;
      z-index: 10;
    }

    .tape-1 {
      width: 120px;
      background: rgba(228,210,150,0.75);
      top: 32px; left: 60px;
      transform: rotate(-8deg);
    }
    .tape-2 {
      width: 100px;
      background: rgba(230,180,180,0.65);
      top: 28px; right: 80px;
      transform: rotate(5deg);
    }
    .tape-3 {
      width: 90px;
      background: rgba(170,200,220,0.65);
      bottom: 40px; left: 100px;
      transform: rotate(6deg);
    }
    .tape-4 {
      width: 110px;
      background: rgba(228,210,150,0.7);
      bottom: 36px; right: 70px;
      transform: rotate(-4deg);
    }

    /* === CENTRAL CARD === */
    .card {
      position: absolute;
      z-index: 5;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-1.5deg);
      width: 820px;
      background: #faf8f2;
      border: 1px solid rgba(61,46,30,0.06);
      box-shadow:
        3px 4px 16px rgba(61,46,30,0.12),
        0 1px 3px rgba(61,46,30,0.06);
      padding: 48px 56px 44px;
      text-align: center;
      outline: 1px solid rgba(255,255,255,0.4);
      outline-offset: -1px;
    }

    /* Tape on card */
    .card-tape-l {
      position: absolute;
      width: 80px; height: 26px;
      background: rgba(228,210,150,0.8);
      top: -10px; left: 40px;
      transform: rotate(-12deg);
      border-radius: 1px;
      z-index: 6;
    }
    .card-tape-r {
      position: absolute;
      width: 70px; height: 24px;
      background: rgba(230,180,180,0.7);
      top: -8px; right: 50px;
      transform: rotate(7deg);
      border-radius: 1px;
      z-index: 6;
    }

    /* === EMOJI STICKERS (scattered) === */
    .sticker {
      position: absolute;
      z-index: 8;
      font-size: 52px;
      filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1));
    }
    .s1 { top: 60px; left: 80px; transform: rotate(-15deg); }
    .s2 { top: 50px; right: 100px; transform: rotate(12deg); font-size: 48px; }
    .s3 { bottom: 55px; left: 120px; transform: rotate(8deg); font-size: 44px; }
    .s4 { bottom: 50px; right: 90px; transform: rotate(-10deg); font-size: 50px; }
    .s5 { top: 50%; left: 50px; transform: translateY(-50%) rotate(-5deg); font-size: 40px; }
    .s6 { top: 50%; right: 55px; transform: translateY(-50%) rotate(8deg); font-size: 42px; }

    /* === TYPOGRAPHY === */
    .main-title {
      font-family: 'Gamja Flower', cursive;
      font-size: 58px;
      font-weight: 400;
      color: #3d2e1e;
      line-height: 1.3;
      margin-bottom: 16px;
      position: relative;
    }

    /* Underline decoration */
    .main-title::after {
      content: '';
      display: block;
      width: 200px;
      height: 4px;
      background: linear-gradient(90deg, #d94f4f, #d4a843, #3a8f8f);
      margin: 12px auto 0;
      border-radius: 2px;
    }

    .sub-info {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 26px;
      color: #6b5a48;
      letter-spacing: 0.08em;
      margin-top: 20px;
    }

    .sub-dot {
      display: inline-block;
      color: #d94f4f;
      margin: 0 12px;
      font-weight: 700;
    }

    /* Party badge */
    .badge {
      display: inline-block;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 16px;
      letter-spacing: 0.2em;
      color: #8b6f4e;
      border: 2px dashed #c6b49a;
      border-radius: 999px;
      padding: 6px 28px;
      margin-bottom: 20px;
    }

    /* Bottom emoji row */
    .emoji-row {
      margin-top: 24px;
      font-size: 36px;
      letter-spacing: 16px;
    }

    /* Pin on card top-center */
    .pin {
      position: absolute;
      top: -12px;
      left: 50%;
      margin-left: -10px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #d94f4f, #a03030);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.3);
      z-index: 7;
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="bg"></div>
  <div class="vignette"></div>

  <!-- Scattered tape -->
  <div class="tape tape-1"></div>
  <div class="tape tape-2"></div>
  <div class="tape tape-3"></div>
  <div class="tape tape-4"></div>

  <!-- Scattered emoji stickers -->
  <span class="sticker s1">🎂</span>
  <span class="sticker s2">🎈</span>
  <span class="sticker s3">🎁</span>
  <span class="sticker s4">🧁</span>
  <span class="sticker s5">🎉</span>
  <span class="sticker s6">🪅</span>

  <!-- Central card -->
  <div class="card">
    <div class="card-tape-l"></div>
    <div class="card-tape-r"></div>
    <div class="pin"></div>

    <div class="badge">🎂 BIRTHDAY PARTY</div>
    <h1 class="main-title">이지호의 생일 파티에<br>초대합니다!</h1>
    <p class="sub-info">
      4월 11일(토)
      <span class="sub-dot">·</span>
      원마운트
    </p>
    <div class="emoji-row">🎂 🎈 🎁 🎉 🧁</div>
  </div>
</body>
</html>
